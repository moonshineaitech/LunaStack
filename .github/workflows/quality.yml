name: Quality Score

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run skill validation (Tier 1)
        run: bash tests/validate_skills.sh

      - name: Run integrity checks
        run: bash tests/validate_integrity.sh

      - name: Run quality scoring (Tier 2)
        run: bash tests/quality_score.sh
